{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">

        <button>
          <span class="navicon"></span>
        </button>

        <ul class="visible-links">

          <!-- Custom two-line site title -->
          <li class="masthead__menu-item masthead__menu-item--lg persist">
            <a href="{{ '/' | relative_url }}" class="site-title">
              <span class="site-name">Keaton C Green</span>
              <span class="site-tagline">Critical Geography</span>
            </a>
          </li>

          <!-- Main navigation links -->
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              {% if link.url contains 'http' %}
                <a href="{{ link.url }}">
                  {{ link.title }}
                </a>
              {% else %}
                <a href="{{ link.url | relative_url }}">
                  {{ link.title }}
                </a>
              {% endif %}
            </li>
          {% endfor %}

          <!-- Theme toggle -->
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <a role="button" aria-labelledby="theme-icon">
              <i
                id="theme-icon"
                class="fa-solid fa-sun"
                aria-hidden="true"
                title="Toggle theme">
              </i>
            </a>
          </li>

        </ul>

        <ul class="hidden-links hidden"></ul>

      </nav>
    </div>
  </div>
</div>

<!-- Bear animation element -->
<div id="cartwheel-bear" aria-hidden="true">
  <img
    src="{{ '/assets/Images/cartwheel-bear.gif' | relative_url }}"
    alt="">
</div>

<script>
(function () {
  const desktopWidth = 1100;
  let resizeTimer;

  function updateNavigation() {
    const visibleLinks = document.querySelector(
      ".greedy-nav .visible-links"
    );

    const hiddenLinks = document.querySelector(
      ".greedy-nav .hidden-links"
    );

    const menuButton = document.querySelector(
      ".greedy-nav > button"
    );

    const themeToggle = document.querySelector(
      "#theme-toggle"
    );

    if (!visibleLinks || !hiddenLinks || !menuButton) {
      return;
    }

    if (window.innerWidth >= desktopWidth) {
      while (hiddenLinks.firstElementChild) {
        if (themeToggle) {
          visibleLinks.insertBefore(
            hiddenLinks.firstElementChild,
            themeToggle
          );
        } else {
          visibleLinks.appendChild(
            hiddenLinks.firstElementChild
          );
        }
      }

      hiddenLinks.classList.add("hidden");
      hiddenLinks.style.display = "none";

      menuButton.classList.add("hidden");
      menuButton.style.display = "none";
    } else {
      hiddenLinks.style.display = "";
      menuButton.style.display = "";
      menuButton.classList.remove("hidden");
    }
  }

  function scheduleUpdate() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(updateNavigation, 100);
  }

  document.addEventListener(
    "DOMContentLoaded",
    updateNavigation
  );

  window.addEventListener(
    "load",
    updateNavigation
  );

  window.addEventListener(
    "resize",
    scheduleUpdate
  );
})();
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const bear = document.getElementById("cartwheel-bear");

  const pillLinks = document.querySelectorAll(
    ".greedy-nav .visible-links > li:not(.masthead__menu-item--lg):not(#theme-toggle) > a"
  );

  if (!bear || pillLinks.length === 0) {
    return;
  }

  let animationRunning = false;

  pillLinks.forEach(function (link) {
    link.addEventListener("click", function (event) {
      const destination = link.href;

      if (
        animationRunning ||
        !destination ||
        event.ctrlKey ||
        event.metaKey ||
        event.shiftKey ||
        event.altKey ||
        link.target === "_blank"
      ) {
        return;
      }

      event.preventDefault();
      animationRunning = true;

      bear.classList.remove("is-running");

      void bear.offsetWidth;

      bear.classList.add("is-running");

      window.setTimeout(function () {
        window.location.assign(destination);
      }, 100);
    });
  });
});
</script>
